name: 构建推送
on:
  push:
    tags:
    - 'v*'
    branches:
    - dev
  workflow_dispatch:
jobs:
  gomail-api:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Login to DockerHub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Calculate Docker Metadata
      id: meta
      run: |
        # 判断逻辑：如果是 手动触发 或者 当前分支/标签名是 dev
        if [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ "${{ github.ref_name }}" == "dev" ]; then
          echo "build_tags=qvgz/gomail-api:dev" >> $GITHUB_OUTPUT
          echo "build_version=dev" >> $GITHUB_OUTPUT
        else
          # 否则默认为 Tag 推送 (v*)
          echo "build_tags=qvgz/gomail-api:latest,qvgz/gomail-api:${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "build_version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        fi
    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./Dockerfile
        push: true
        platforms: linux/amd64,linux/arm64
        build-args: |
          VERSION=${{ steps.meta.outputs.build_version }}
        tags: ${{ steps.meta.outputs.build_tags }}
